  <!-- щёчки -->
  <circle cx="86" cy="150" r="10" fill="#FC7D4F" opacity="0.32"/>
  <circle cx="154" cy="150" r="10" fill="#FC7D4F" opacity="0.32"/>

  <!-- глаза (счастливо зажмуренные ^_^) -->
  <path d="M92 138 Q100 130 108 138" stroke="#54381F" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <path d="M132 138 Q140 130 148 138" stroke="#54381F" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- улыбка -->
  <path d="M104 152 Q120 168 136 152" stroke="#54381F" stroke-width="5.5" stroke-linecap="round" fill="none"/>
